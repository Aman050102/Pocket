<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pocket — Finance</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <div id="view-home" class="view">
      <header class="header">
        <div class="brand">Pocket</div>
        <input type="month" id="month-filter" class="month-input">
      </header>

      <div class="card balance-card">
        <span class="label">ยอดคงเหลือรวม</span>
        <h2 id="total-net">฿0.00</h2>
        <div class="stats-row">
          <div class="stat"><span>รายรับ</span><strong class="in" id="total-in">฿0</strong></div>
          <div class="stat"><span>รายจ่าย</span><strong class="out" id="total-out">฿0</strong></div>
        </div>
      </div>

      <section class="list-section">
        <div class="section-title">
          <span>รายการล่าสุด</span>
          <button onclick="openEntryModal()" class="btn-add">+ เพิ่มรายการ</button>
        </div>
        <div id="transaction-list"></div>
      </section>
    </div>

    <div id="view-accounts" class="view hidden">
      <header class="header">
        <h3>🏦 จัดการบัญชี</h3>
      </header>
      <div class="input-group">
        <input type="text" id="new-acc-input" placeholder="เช่น เงินสด, กสิกร, ออมสิน">
        <button onclick="addAccount()" class="btn-primary">เพิ่ม</button>
      </div>
      <div id="account-list-render" class="category-grid"></div>
    </div>

    <div id="view-categories" class="view hidden">
      <header class="header">
        <h3>🏷️ จัดการหมวดหมู่</h3>
      </header>
      <div class="input-group">
        <input type="text" id="new-cat-input" placeholder="เช่น อาหาร, เดินทาง, ช้อปปิ้ง">
        <button onclick="addCategory()" class="btn-primary">เพิ่ม</button>
      </div>
      <div id="category-list-render" class="category-grid"></div>
    </div>

    <nav class="nav-bar">
      <button onclick="switchView('home')" id="nav-home" class="active">🏠 <span>หน้าแรก</span></button>
      <button onclick="switchView('accounts')" id="nav-accounts">🏦 <span>บัญชี</span></button>
      <button onclick="switchView('categories')" id="nav-cats">🏷️ <span>หมวดหมู่</span></button>
    </nav>

    <div id="entry-modal" class="modal">
      <div class="modal-content">
        <h4>บันทึกรายการ</h4>
        <form id="entry-form">
          <input type="text" id="desc" placeholder="ทำรายการอะไร?" required>
          <div class="row">
            <input type="number" id="amt" placeholder="0.00" step="any" required>
            <select id="type-select">
              <option value="out">รายจ่าย</option>
              <option value="in">รายรับ</option>
            </select>
          </div>
          <div class="row">
            <select id="acc-select" class="full-select" required></select>
            <select id="cat-select" class="full-select" required></select>
          </div>
          <div class="modal-btns">
            <button type="button" onclick="closeEntryModal()" class="btn-flat">ยกเลิก</button>
            <button type="submit" class="btn-primary">บันทึกข้อมูล</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
